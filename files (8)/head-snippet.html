<!--
  ═══════════════════════════════════════════════════════════════════════════
  EKOSİSTEM SOSYAL — HTML <head> Entegrasyon Snippet'i
  ═══════════════════════════════════════════════════════════════════════════

  Kurulum:
  1. /public/icons/ klasörü oluştur (veya /static/icons/)
  2. Aşağıdaki ikonları o klasöre kopyala:
       favicon.svg
       favicon.ico
       favicon-16.png
       favicon-32.png
       favicon-48.png
       apple-touch-icon.png
       icon-192.png
       icon-512.png
       icon-512-maskable.png
       site.webmanifest
  3. favicon.ico dosyasını sitenin köküne (/) de koy — bazı eski botlar orayı arar
  4. Aşağıdaki <link> ve <meta> etiketlerini HTML dosyanın <head>'ine ekle
  ═══════════════════════════════════════════════════════════════════════════
-->

<!-- Favicon — modern tarayıcılar SVG'yi tercih eder, dark mode otomatik -->
<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">

<!-- Favicon — PNG fallback (SVG desteklemeyen tarayıcılar için) -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

<!-- Legacy .ico (IE, eski Safari, bazı arama motoru botları) -->
<link rel="shortcut icon" href="/favicon.ico">

<!-- Apple Touch Icon — iOS/iPadOS ana ekran -->
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">

<!-- PWA Manifest -->
<link rel="manifest" href="/icons/site.webmanifest">

<!-- Tarayıcı ve platform tema renkleri -->
<meta name="theme-color" content="#0D5C4A">
<meta name="msapplication-TileColor" content="#0D5C4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ekosistem">
